services:
  postgres-test:
    image: postgres:15
    container_name: time-management-test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timemanagement_test
    ports:
      - "5433:5432"
    volumes:
      - postgres-test-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-test-data:

