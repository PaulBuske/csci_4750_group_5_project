version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: csci4750_postgres
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: csci4750db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d csci4750db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: