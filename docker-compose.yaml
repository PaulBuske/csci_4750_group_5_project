version: ''

services:
  postgres:
    image: postgres:15
    container_name: time-management-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: timemanagement
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d timemanagement"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: time-management-migrate
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/timemanagement?schema=public"
      JWT_SECRET: "${JWT_SECRET:-local_docker_dev_secret_at_least_32_chars!}"
    command: sh scripts/docker-setup.sh
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4
    container_name: time-management-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: pgadmin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: time-management-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/timemanagement?schema=public"
      JWT_SECRET: "${JWT_SECRET:-local_docker_dev_secret_at_least_32_chars!}"
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:


